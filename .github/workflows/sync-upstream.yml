name: Sync Upstream

# Daily check for new upstream (mimo2codex) releases.
# Automatically merges upstream changes when there's no conflict
# with our visual-fallback patches.

on:
  schedule:
    # Every day at 08:00 UTC (16:00 Beijing)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no auto-merge)'
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout mimo-multi
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/7as0nch/mimo2codex.git
          git fetch upstream main

      - name: Get current versions
        id: versions
        run: |
          echo "current=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "upstream=$(git rev-parse upstream/main)" >> $GITHUB_OUTPUT
          echo "current_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo 'none')" >> $GITHUB_OUTPUT

      - name: Check if upstream has new commits
        id: check
        run: |
          if [ "${{ steps.versions.outputs.current }}" = "${{ steps.versions.outputs.upstream }}" ]; then
            echo "No new upstream commits. Skipping."
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            echo "Upstream has new commits."
            echo "has_updates=true" >> $GITHUB_OUTPUT
          fi

      - name: Attempt merge
        if: steps.check.outputs.has_updates == 'true'
        id: merge
        run: |
          if git merge --no-commit --no-ff upstream/main 2>&1 | tee /tmp/merge.log; then
            echo "Merge succeeded with no conflicts."
            echo "conflict=false" >> $GITHUB_OUTPUT
          else
            echo "Merge has conflicts."
            echo "conflict=true" >> $GITHUB_OUTPUT
            # Abort the failed merge
            git merge --abort 2>/dev/null || true
          fi

      - name: Check if conflict touches server.ts
        if: steps.merge.outputs.conflict == 'true'
        id: conflict_check
        run: |
          CONFLICT_FILES=$(git diff --name-only --diff-filter=U 2>/dev/null || echo "")
          if echo "$CONFLICT_FILES" | grep -q "src/server.ts"; then
            echo "CRITICAL: Conflict in src/server.ts — needs manual resolution."
            echo "critical=true" >> $GITHUB_OUTPUT
          else
            echo "Conflicts in non-critical files."
            echo "critical=false" >> $GITHUB_OUTPUT
          fi
          echo "files=$CONFLICT_FILES" >> $GITHUB_OUTPUT

      - name: Commit and push merge
        if: steps.merge.outputs.conflict == 'false' && steps.check.outputs.has_updates == 'true' && inputs.dry_run != true
        run: |
          git commit -m "chore: sync upstream $(git rev-parse --short upstream/main)

          Auto-merged from mimo2codex upstream. No conflicts detected."
          git push origin main

      - name: Create issue on critical conflict
        if: steps.conflict_check.outputs.critical == 'true' && inputs.dry_run != true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[upstream-conflict] src/server.ts has merge conflict with upstream',
              body: `Upstream (mimo2codex) published new changes that conflict with our visual-fallback patch in \`src/server.ts\`.

              **Upstream commit**: ${process.env.UPSTREAM_SHA}
              **Conflicting files**: ${process.env.CONFLICT_FILES}

              Manual resolution required.`,
              labels: ['upstream-conflict', 'needs-manual-fix']
            });
        env:
          UPSTREAM_SHA: ${{ steps.versions.outputs.upstream }}
          CONFLICT_FILES: ${{ steps.conflict_check.outputs.files }}

      - name: Create issue on non-critical conflict
        if: steps.conflict_check.outputs.critical == 'false' && steps.merge.outputs.conflict == 'true' && inputs.dry_run != true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[upstream-sync] Non-critical merge conflicts with upstream',
              body: `Upstream has new commits that cause merge conflicts (not in server.ts).

              **Conflicting files**: ${process.env.CONFLICT_FILES}

              These can likely be resolved automatically or with minimal manual effort.`,
              labels: ['upstream-sync']
            });
        env:
          CONFLICT_FILES: ${{ steps.conflict_check.outputs.files }}

      - name: Summary
        run: |
          echo "### Upstream Sync Result" >> $GITHUB_STEP_SUMMARY
          echo "- Current: ${{ steps.versions.outputs.current }}" >> $GITHUB_STEP_SUMMARY
          echo "- Upstream: ${{ steps.versions.outputs.upstream }}" >> $GITHUB_STEP_SUMMARY
          echo "- Has updates: ${{ steps.check.outputs.has_updates }}" >> $GITHUB_STEP_SUMMARY
          echo "- Conflict: ${{ steps.merge.outputs.conflict || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
