name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # `gh release create` needs this; was `read` before adding the GitHub Release step.
  id-token: write   # npm provenance.

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Pull tag objects (including their annotated messages) so the
          # "Create GitHub Release" step below can read the tag subject
          # written by scripts/release.mjs.
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - run: npm ci

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      # Run the same build-all + tests we expect prepublishOnly to run, so any
      # failure (frontend build, type errors, etc.) surfaces before we hit
      # `npm publish` and consumes the version slot. `npm publish` will still
      # re-run prepack to produce the final tarball.
      - run: npm run build:all
      - run: npm test

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create the GitHub Release ONLY after a successful npm publish, so the
      # sidebar "Latest" badge never points at a version that didn't actually
      # ship. Title comes from the tag's annotation subject (e.g. the message
      # `scripts/release.mjs` writes — "0.1.17 - [fix] xxx"). Body is auto
      # generated from commits between this tag and the previous release.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE=$(git tag -l --format='%(contents:subject)' "$TAG")
          if [ -z "$TITLE" ]; then TITLE="$TAG"; fi
          gh release create "$TAG" \
            --verify-tag \
            --title "$TITLE" \
            --generate-notes
