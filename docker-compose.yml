# mimo-multi docker-compose 部署
# 用法：
#   1. cp .env.example .env  并填入 API key (MIMO_API_KEY 或 DEEPSEEK_API_KEY 等)
#   2. docker compose up -d
#   3. 浏览器打开 http://localhost:8788/admin
#
# 数据目录挂在 ./.mimo-multi/，包含 sqlite + providers.json + admin UI 状态。
# 想复用现有数据目录，把 volumes 改成你实际的 data 路径即可。

services:
  mimo-multi:
    build: .
    container_name: mimo-multi
    restart: unless-stopped
    ports:
      - "8788:8788"
    environment:
      - MIMO2CODEX_DATA_DIR=/data
    env_file:
      - .env
    volumes:
      - ./.mimo-multi:/data
